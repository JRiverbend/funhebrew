<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <link rel="apple-touch-icon" href="icon.png">
    
    <title>FunHebrew</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --il-blue: #0038A8; /* Синий цвет флага Израиля */
            --il-white: #ffffff;
            --bg: #f5f7fa; 
            --text-dark: #1a1a1b;
        }
        
        body { 
            background-color: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            padding: 15px; 
            direction: rtl; 
            color: var(--text-dark);
        }

        .header h1 { 
            text-align: center; 
            font-size: 26px; 
            color: var(--il-blue); 
            margin: 15px 0 25px 0;
            text-shadow: 1px 1px 0px var(--il-white);
        }

        .card { 
            background: var(--il-white); 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: 0 4px 12px rgba(0, 56, 168, 0.08); 
            margin-bottom: 16px; 
            border: 1px solid rgba(0, 56, 168, 0.1);
        }

        .headline { 
            font-size: 18px; 
            line-height: 1.5; 
            font-weight: 700; 
            margin-bottom: 18px; 
            color: var(--text-dark); 
        }

        /* Кнопки в стиле Израильского флага */
        .actions { 
            display: flex; 
            gap: 10px; 
        }

        button { 
            flex: 1; 
            border: 2px solid var(--il-blue); 
            border-radius: 12px; 
            padding: 12px 5px; 
            font-size: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active { 
            transform: translateY(2px); 
        }

        /* Кнопка Слушать - Белая с синим текстом */
        .btn-speak { 
            background-color: var(--il-white); 
            color: var(--il-blue); 
        }

        /* Кнопка Перевод - Синяя с белым текстом */
        .btn-trans { 
            background-color: var(--il-blue); 
            color: var(--il-white); 
        }

        /* Кнопка Сохранить - Контурная */
        .btn-save { 
            background-color: transparent; 
            color: var(--il-blue);
            border-style: dashed;
        }

        /* Стиль для словаря */
        #my-vocabulary h3 {
            color: var(--il-blue);
            border-bottom: 2px solid var(--il-blue);
            padding-bottom: 5px;
            display: inline-block;
        }

        .vocab-item { 
            background: var(--il-white); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-right: 5px solid var(--il-blue);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .btn-del { 
            border: none;
            color: #ff3b30; 
            font-size: 18px; 
            width: auto; 
            background: none;
        }
    </style>
</head>
<body>
    <div class="header"><h1>חדשות בעברית</h1></div>
    <div class="lang-selector">
        <select id="langSelect" onchange="changeLang()">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="am">አማርኛ</option>
        </select>
    </div>
    <div id="news-container"></div>
    <div id="my-vocabulary"><h3 id="vocab-title">⭐ Мой словарь</h3><div id="vocab-list"></div></div>

    <script>
        const translations = {
            ru: { speak: "🔊 Слушать", trans: "🌐 Перевод", save: "⭐ Учить", vocab: "⭐ Мой словарь" },
            en: { speak: "🔊 Listen", trans: "🌐 Translate", save: "⭐ Save", vocab: "⭐ My Vocabulary" },
            fr: { speak: "🔊 Écouter", trans: "🌐 Traduire", save: "⭐ Apprendre", vocab: "⭐ Mon dico" },
            am: { speak: "🔊 አዳምጥ", trans: "🌐 ተርጉም", save: "⭐ አጥና", vocab: "⭐ የእኔ መዝገበ ቃላት" }
        };

        let currentLang = localStorage.getItem('funLang') || 'ru';
        document.getElementById('langSelect').value = currentLang;

        function changeLang() {
            currentLang = document.getElementById('langSelect').value;
            localStorage.setItem('funLang', currentLang);
            fetchNews();
            renderVocab();
        }

        async function fetchNews() {
            try {
                const RSS_URL = 'https://www.ynet.co.il/Integration/StoryRss2.xml';
                const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                data.items.slice(0, 5).forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="headline" id="head-${index}">${item.title}</div>
                        <div class="actions">
                            <button class="btn-speak" onclick="speakFromId('head-${index}')">${translations[currentLang].speak}</button>
                            <button class="btn-trans" onclick="translateFromId('head-${index}')">${translations[currentLang].trans}</button>
                            <button class="btn-save" onclick="saveWord(${index})">${translations[currentLang].save}</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'he-IL';
            window.speechSynthesis.speak(ut);
        }
        function speakFromId(id) { speakText(document.getElementById(id).innerText); }
        
        function translateFromId(id) { 
            const text = document.getElementById(id).innerText;
            window.open(`https://translate.google.com/?sl=iw&tl=${currentLang}&text=${encodeURIComponent(text)}&op=translate`, '_blank'); 
        }

        function saveWord(id) {
            const text = document.getElementById('head-' + id).innerText;
            let words = JSON.parse(localStorage.getItem('funHebrewWords') || '[]');
            if (!words.includes(text)) {
                words.push(text);
                localStorage.setItem('funHebrewWords', JSON.stringify(words));
                renderVocab();
            }
        }

        function renderVocab() {
            document.getElementById('vocab-title').innerText = translations[currentLang].vocab;
            const list = document.getElementById('vocab-list');
            const words = JSON.parse(localStorage.getItem('funHebrewWords') || '[]');
            list.innerHTML = words.length ? '' : '...';
            words.slice().reverse().forEach((word, index) => {
                const actualIndex = words.length - 1 - index;
                const div = document.createElement('div');
                div.className = 'vocab-item';
                const safeWord = word.replace(/'/g, "\\'");
                div.innerHTML = `
                    <div onclick="speakText('${safeWord}')" style="cursor:pointer;flex:1">${word}</div>
                    <button class="btn-del" onclick="deleteWord(${actualIndex})">✕</button>
                `;
                list.appendChild(div);
            });
        }

        function deleteWord(index) {
            let words = JSON.parse(localStorage.getItem('funHebrewWords') || '[]');
            words.splice(index, 1);
            localStorage.setItem('funHebrewWords', JSON.stringify(words));
            renderVocab();
        }

        fetchNews();
        renderVocab();
    </script>
</body>
</html>
