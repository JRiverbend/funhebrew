<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">
    <title>FunHebrew</title>
    <style>
        :root { --il-blue: #0038A8; --il-white: #ffffff; --bg: #f8f9fa; --text-dark: #1c1c1e; }
        body { background-color: var(--bg); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; direction: rtl; color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; }
        .header-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; padding: 10px 5px; }
        .header-container h1 { font-size: 32px; color: var(--il-blue); margin: 0 0 8px 0; font-weight: 800; text-align: center; }
        select { padding: 6px 10px; border-radius: 8px; border: 1.5px solid var(--il-blue); font-size: 14px; background: var(--il-white); color: var(--il-blue); width: 100px; outline: none; }
        .card { background: var(--il-white); border-radius: 16px; padding: 20px; box-shadow: 0 4px 12px rgba(0, 56, 168, 0.08); margin-bottom: 16px; border: 1px solid rgba(0, 56, 168, 0.1); position: relative; }
        .news-date { font-size: 11px; color: #8e8e93; margin-bottom: 8px; font-weight: 500; display: block; text-align: right; }
        .headline { font-size: 18px; line-height: 1.6; font-weight: 700; margin-bottom: 18px; text-align: right; }
        .actions { display: flex; gap: 8px; }
        button { flex: 1; border: 2px solid var(--il-blue); border-radius: 12px; padding: 12px 4px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        button:active { transform: scale(0.96); }
        .btn-speak { background: var(--il-white); color: var(--il-blue); }
        .btn-trans { background: var(--il-blue); color: var(--il-white); }
        .btn-save { background: var(--il-white); color: var(--il-blue); border-style: solid; }
        #my-vocabulary { flex-grow: 1; margin-top: 30px; }
        .vocab-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .vocab-header h3 { color: var(--il-blue); margin: 0; font-size: 22px; }
        .btn-export { background: none; border: 1.5px solid var(--il-blue); color: var(--il-blue); font-size: 12px; padding: 4px 8px; border-radius: 8px; width: auto; flex: none; }
        .vocab-item { background: var(--il-white); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; flex-direction: column; border-right: 5px solid var(--il-blue); box-shadow: 0 2px 6px rgba(0,0,0,0.05); position: relative; }
        .vocab-he { font-weight: 700; font-size: 17px; margin-bottom: 4px; text-align: right; cursor: pointer; color: var(--il-blue); }
        .vocab-tr { font-size: 14px; color: #555; text-align: right; font-style: italic; }
        .btn-del { position: absolute; left: 10px; top: 15px; border: none; color: #ff3b30; background: none; font-size: 18px; cursor: pointer; }
        .share-section { text-align: center; margin-top: 30px; }
        .btn-share { background: var(--il-blue); color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 16px; width: auto; margin: 0 auto; display: inline-flex; }
        .footer { text-align: center; padding: 25px 0; color: #8e8e93; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>חדשות בעברית</h1>
        <select id="langSelect" onchange="changeLang()">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="am">አማርኛ</option>
        </select>
    </div>
    <div id="news-container"></div>
    <div id="my-vocabulary">
        <div class="vocab-header">
            <h3 id="vocab-title">⭐ Мой словарь</h3>
            <button class="btn-export" id="exportBtn" onclick="exportVocab()">📋 Копировать всё</button>
        </div>
        <div id="vocab-list"></div>
    </div>
    <div class="share-section"><button class="btn-share" onclick="shareApp()">🔗 Поделиться приложением</button></div>
    <div class="footer">Made with ❤️ in Israel</div>

    <script>
        const translations = {
            ru: { speak: "🔊 Слушать", trans: "🌐 Перевод", save: "⭐ Учить", vocab: "⭐ Мой словарь", share: "🔗 Поделиться", empty: "Список пуст", prompt: "Введите перевод этой фразы:", copy: "📋 Копировать всё", copied: "✅ Скопировано!" },
            en: { speak: "🔊 Listen", trans: "🌐 Translate", save: "⭐ Save", vocab: "⭐ My Vocabulary", share: "🔗 Share", empty: "List is empty", prompt: "Enter translation:", copy: "📋 Export all", copied: "✅ Copied!" },
            fr: { speak: "🔊 Écouter", trans: "🌐 Traduire", save: "⭐ Apprendre", vocab: "⭐ Mon dico", share: "🔗 Partager", empty: "Liste vide", prompt: "Entrez la traduction:", copy: "📋 Tout copier", copied: "✅ Copié!" },
            am: { speak: "🔊 አዳምጥ", trans: "🌐 ተርጉም", save: "⭐ አጥна", vocab: "⭐ የእኔ मዝገበ ቃላት", share: "🔗 አጋራ", empty: "ዝርዝሩ ባዶ ነው", prompt: "የትርጉም ጽሑፉን ያስገቡ:", copy: "📋 ሁሉንም ቅዳ", copied: "✅ ተቀድቷል!" }
        };

        let currentLang = localStorage.getItem('funLang') || 'ru';
        document.getElementById('langSelect').value = currentLang;

        function changeLang() {
            currentLang = document.getElementById('langSelect').value;
            localStorage.setItem('funLang', currentLang);
            fetchNews();
            renderVocab();
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        async function fetchNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = '<p style="text-align:center; padding: 20px;">טוען חדשות... (Загрузка)</p>';
            
            const targetUrl = 'https://hadshon.education.gov.il/wp-json/wp/v2/posts?per_page=5';
            
            // Пробуем два разных прокси для надежности
            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
            ];

            for (let proxy of proxies) {
                try {
                    const response = await fetch(proxy);
                    if (!response.ok) continue;
                    
                    const data = await response.json();
                    // AllOrigins возвращает данные в contents, corsproxy.io возвращает напрямую
                    const content = data.contents ? JSON.parse(data.contents) : data;

                    if (Array.isArray(content) && content.length > 0) {
                        renderCards(content);
                        return; // Успешно загрузили, выходим из цикла
                    }
