<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">
    <title>FunHebrew</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --il-blue: #0038A8; 
            --il-white: #ffffff;
            --bg: #f8f9fa; 
            --text-dark: #1c1c1e;
        }
        
        body { 
            background-color: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            margin: 0; padding: 15px; direction: rtl; color: var(--text-dark);
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* Заголовок сверху */
        .header h1 { 
            text-align: center; 
            font-size: 24px; 
            color: var(--il-blue); 
            margin: 20px 0 10px 0; 
        }

        /* Компактный выбор языка под заголовком */
        .lang-selector { 
            text-align: center; 
            margin-bottom: 25px; 
        }
        select { 
            padding: 8px 12px; 
            border-radius: 10px; 
            border: 2px solid var(--il-blue); 
            font-size: 16px; 
            font-weight: 600;
            background: var(--il-white);
            color: var(--il-blue);
            width: 140px; 
            cursor: pointer;
            outline: none;
        }

        .card { 
            background: var(--il-white); border-radius: 16px; padding: 20px; 
            box-shadow: 0 4px 12px rgba(0, 56, 168, 0.08); margin-bottom: 16px; 
            border: 1px solid rgba(0, 56, 168, 0.1);
        }

        .headline { font-size: 18px; line-height: 1.5; font-weight: 700; margin-bottom: 18px; }

        .actions { display: flex; gap: 8px; }
        button { 
            flex: 1; border: 2px solid var(--il-blue); border-radius: 12px; 
            padding: 12px 4px; font-size: 13px; font-weight: 700; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.96); }

        .btn-speak { background: var(--il-white); color: var(--il-blue); }
        .btn-trans { background: var(--il-blue); color: var(--il-white); }
        /* Кнопка сохранить теперь со сплошной рамкой */
        .btn-save { background: var(--il-white); color: var(--il-blue); border-style: solid; }

        #my-vocabulary { flex-grow: 1; margin-top: 30px; }
        #vocab-title { color: var(--il-blue); text-align: center; margin-bottom: 15px; }
        
        .vocab-item { 
            background: var(--il-white); padding: 15px; border-radius: 12px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; 
            border-right: 5px solid var(--il-blue);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .btn-del { border: none; color: #ff3b30; background: none; font-size: 18px; flex: none; width: auto; }

        .share-section { text-align: center; margin-top: 30px; }
        .btn-share { 
            background: var(--il-blue); color: white; border: none; 
            padding: 15px 30px; border-radius: 25px; font-size: 16px; 
            width: auto; margin: 0 auto; display: inline-flex;
        }

        .footer { text-align: center; padding: 25px 0; color: #8e8e93; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header"><h1>חדשות בעברית</h1></div>

    <div class="lang-selector">
        <select id="langSelect" onchange="changeLang()">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="am">አማርኛ</option>
        </select>
    </div>

    <div id="news-container"></div>

    <div id="my-vocabulary">
        <h3 id="vocab-title">⭐ Мой словарь</h3>
        <div id="vocab-list"></div>
    </div>

    <div class="share-section">
        <button class="btn-share" onclick="shareApp()">🔗 Поделиться приложением</button>
    </div>

    <div class="footer">
        Made with ❤️ in Israel
    </div>

    <script>
        const translations = {
            ru: { speak: "🔊 Слушать", trans: "🌐 Перевод", save: "⭐ Учить", vocab: "⭐ Мой словарь", share: "🔗 Поделиться", empty: "Список пуст" },
            en: { speak: "🔊 Listen", trans: "🌐 Translate", save: "⭐ Save", vocab: "⭐ My Vocabulary", share: "🔗 Share", empty: "List is empty" },
            fr: { speak: "🔊 Écouter", trans: "🌐 Traduire", save: "⭐ Apprendre", vocab: "⭐ Mon dico", share: "🔗 Partager", empty: "Liste vide" },
            am: { speak: "🔊 አዳምጥ", trans: "🌐 ተርጉም", save: "⭐ አጥና", vocab: "⭐ የእኔ መዝገበ ቃላት", share: "🔗 አጋራ", empty: "ዝርዝሩ ባዶ ነው" }
        };

        let currentLang = localStorage.getItem('funLang') || 'ru';
        document.getElementById('langSelect').value = currentLang;

        function changeLang() {
            currentLang = document.getElementById('langSelect').value;
            localStorage.setItem('funLang', currentLang);
            fetchNews();
            renderVocab();
        }

        async function fetchNews() {
            try {
                const RSS_URL = 'https://www.ynet.co.il/Integration/StoryRss2.xml';
                const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                data.items.slice(0, 5).forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="headline" id="head-${index}">${item.title}</div>
                        <div class="actions">
                            <button class="btn-speak" onclick="speakFromId('head-${index}')">${translations[currentLang].speak}</button>
                            <button class="btn-trans" onclick="translateFromId('head-${index}')">${translations[currentLang].trans}</button>
                            <button class="btn-save" onclick="saveWord(${index})">${translations[currentLang].save}</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'he-IL';
            window.speechSynthesis.speak(ut);
        }
